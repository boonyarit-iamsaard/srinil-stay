name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: .NET format check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.203

      - name: Check formatting
        run: make format-check

  test:
    name: .NET test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: format

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.203

      - name: Run tests
        run: make test

  build:
    name: .NET publish and Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.203

      - name: Publish application
        run: make publish

      - name: Build Docker image
        run: docker build --tag srinil-stay-api:${{ github.sha }} .
